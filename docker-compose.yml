services:
  app:
    build: .
    image: dntech_ecommerce:local
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db;Database=DnTech_Ecommerce;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True
    volumes:
      - dataprotection:/home/app/.aspnet/DataProtection-Keys  # ✅ added
    depends_on:
      db:
        condition: service_healthy
    networks:
      - appnet

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${DB_PASSWORD}
      - MSSQL_PID=Developer
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${DB_PASSWORD}", "-Q", "SELECT 1", "-No"]  # ✅ fixed localhost
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - appnet

volumes:
  sqldata:
  dataprotection:  # ✅ added

networks:
  appnet: